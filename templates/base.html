<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Paprika{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js" defer></script>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <!-- Logo -->
    <div class="sidebar-logo">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="28" height="28" rx="7" fill="#FF9500"/>
        <path d="M14 5C14 5 8 9 8 15.5a6 6 0 0 0 12 0C20 9 14 5 14 5z" fill="white" opacity=".9"/>
        <path d="M14 10C14 10 11 12 11 15.5a3 3 0 0 0 6 0C17 12 14 10 14 10z" fill="#FF9500"/>
      </svg>
      <span class="sidebar-logo-text">Paprika</span>
    </div>

    <!-- Main Menu -->
    <div class="sidebar-section">Main Menu</div>
    <nav>
      <a href="/recipes" class="nav-item {% if request.url.path == '/recipes' and not request.query_params.get('favorites') %}active{% endif %}">
        <svg class="nav-item-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/>
        </svg>
        All Recipes
      </a>
      <a href="/recipes?sort=recent" class="nav-item {% if request.query_params.get('sort') == 'recent' %}active{% endif %}">
        <div class="nav-dot"></div>
        Most Recent
      </a>
      <a href="/recipes?sort=rating" class="nav-item {% if request.query_params.get('sort') == 'rating' and not request.query_params.get('favorites') %}active{% endif %}">
        <div class="nav-dot"></div>
        Top Rated
      </a>
      <a href="/recipes?favorites=1" class="nav-item {% if request.query_params.get('favorites') == '1' %}active{% endif %}">
        <svg class="nav-item-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/>
        </svg>
        Favorites
      </a>
      <a href="/suggest" class="nav-item {% if request.url.path == '/suggest' %}active{% endif %}">
        <svg class="nav-item-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
        </svg>
        Find by Ingredient
      </a>
      <a href="/menus" class="nav-item {% if request.url.path == '/menus' %}active{% endif %}">
        <svg class="nav-item-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/>
        </svg>
        Meals
      </a>
      <a href="/grocery" class="nav-item {% if request.url.path == '/grocery' %}active{% endif %}">
        <svg class="nav-item-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/>
        </svg>
        Groceries
      </a>
    </nav>

    <!-- Categories -->
    {% block sidebar_cats %}{% endblock %}
  </aside>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

</div>
</body>
</html>
